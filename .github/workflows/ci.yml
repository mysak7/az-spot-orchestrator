name: CI

on:
  push:
    branches: ["**"]

jobs:
  # ── Lint ────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check .

      - name: Run ruff format check
        run: ruff format --check .

  # ── Type check ──────────────────────────────────────────────────────────────
  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies + mypy
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip install mypy types-requests
          pip install azure-cosmos-stubs azure-storage-blob-stubs || true  # stubs are best-effort

      - name: Run mypy
        run: |
          mypy . \
            --ignore-missing-imports \
            --exclude '\.venv|terraform|test_' \
            --python-version 3.11

  # ── Docker build ────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: az-spot-orchestrator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
