name: CD

on:
  push:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Build & push to GitHub Container Registry ───────────────────────────────
  # ghcr.io uses GITHUB_TOKEN — no Azure auth needed here.
  push:
    name: Build & push image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to control-plane VM ──────────────────────────────────────────────
  # Uses OIDC / Workload Identity Federation — no client secret stored anywhere.
  # GitHub's OIDC provider issues a short-lived token; Azure AD validates it
  # against the federated credential in github_oidc.tf (subject = master branch).
  deploy:
    name: Deploy to control plane
    runs-on: ubuntu-latest
    needs: push

    permissions:
      contents: read
      id-token: write   # required for OIDC token issuance

    steps:
      - name: Log in to Azure (OIDC — no secret)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Sync docker-compose.yml to VM
        # Push the current docker-compose.yml to the server so volume mounts
        # and other config changes are always in sync with the repo.
        uses: actions/checkout@v4

      - name: Deploy via VM run-command
        # Auth: OIDC (no secrets). The VM itself uses its managed identity at
        # runtime — so .env contains only non-secret configuration values, all
        # of which are auto-populated as Actions Variables by `terraform apply`.
        env:
          APP_ENV: |
            COSMOS_ENDPOINT=${{ vars.COSMOS_ENDPOINT }}
            AZURE_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID }}
            AZURE_RESOURCE_GROUP=${{ vars.AZURE_RESOURCE_GROUP }}
            AZURE_SSH_PUBLIC_KEY=${{ vars.AZURE_SSH_PUBLIC_KEY }}
            AZURE_STORAGE_ACCOUNT_NAME=${{ vars.AZURE_STORAGE_ACCOUNT_NAME }}
            AZURE_STORAGE_CONTAINER_NAME=model-cache
            CONTROL_PLANE_URL=${{ vars.CONTROL_PLANE_URL }}
            TEMPORAL_HOST=temporal:7233
            TEMPORAL_NAMESPACE=default
            TEMPORAL_TASK_QUEUE=vm-provisioning
        run: |
          COMPOSE_CONTENT=$(base64 -w0 docker-compose.yml)
          ENV_CONTENT=$(echo "$APP_ENV" | base64 -w0)
          az vm run-command invoke \
            --resource-group az-spot-orchestrator-rg \
            --name       az-spot-orchestrator-vm \
            --command-id RunShellScript \
            --scripts "
              set -e
              mkdir -p /home/azureuser/az-spot-orchestrator
              cd /home/azureuser/az-spot-orchestrator
              echo '${COMPOSE_CONTENT}' | base64 -d > docker-compose.yml
              echo '${ENV_CONTENT}' | base64 -d > .env
              echo '${{ secrets.GITHUB_TOKEN }}' \
                | docker login ghcr.io -u ${{ github.actor }} --password-stdin
              docker compose pull api worker
              docker compose up -d --no-deps api worker
              docker image prune -f
            "

      - name: Log out of Azure
        if: always()
        run: az logout
