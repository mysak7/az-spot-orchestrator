version: "3.9"

# No PostgreSQL — app state lives in Azure Cosmos DB (real account or emulator).
# Temporal uses its built-in SQLite dev server, so no external DB is needed.

services:
  # ── Temporal dev server (SQLite backend + built-in UI) ───────────────────────
  temporal:
    image: temporalio/admin-tools:latest
    entrypoint: ["/usr/local/bin/temporal"]
    command:
      - server
      - start-dev
      - --ip
      - "0.0.0.0"
      - --port
      - "7233"
      - --ui-port
      - "8080"
      - --db-filename
      - /data/temporal.db
      - --namespace
      - default
    ports:
      - "7233:7233"
      - "8080:8080"   # Temporal UI
    volumes:
      - temporal_data:/data
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Control Plane API ────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  # ── Temporal Worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    command: python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
    volumes:
      - .:/app

volumes:
  temporal_data:
