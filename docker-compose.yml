version: "3.9"

services:
  # ── State Store ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: az_spot_orchestrator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Temporal (uses its own 'temporal' database on the same Postgres) ─────────
  temporal:
    image: temporalio/auto-setup:1.24
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgresql
      DB_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PWD: postgres
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--namespace", "default"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"

  # ── Control Plane API ────────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/az_spot_orchestrator
      TEMPORAL_HOST: temporal:7233
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  # ── Temporal Worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    command: python worker.py
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_started
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/az_spot_orchestrator
      TEMPORAL_HOST: temporal:7233
    volumes:
      - .:/app

volumes:
  postgres_data:
