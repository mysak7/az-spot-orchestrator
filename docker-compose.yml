version: "3.9"

# No PostgreSQL — app state lives in Azure Cosmos DB (real account or emulator).
# Temporal uses its built-in SQLite dev server, so no external DB is needed.

services:
  # ── Temporal dev server (SQLite backend + built-in UI) ───────────────────────
  temporal:
    image: temporalio/admin-tools:latest
    entrypoint: ["/usr/local/bin/temporal"]
    command:
      - server
      - start-dev
      - --ip
      - "0.0.0.0"
      - --port
      - "7233"
      - --ui-port
      - "8080"
      - --db-filename
      - /data/temporal.db
      - --namespace
      - default
    ports:
      - "7233:7233"
      - "8080:8080"   # Temporal UI
    volumes:
      - temporal_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "temporal", "workflow", "list", "--address", "localhost:7233"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ── Control Plane API ────────────────────────────────────────────────────────
  api:
    build: .
    image: ghcr.io/mysak7/az-spot-orchestrator:latest
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
    ports:
      - "80:8000"
    restart: unless-stopped

  # ── Temporal Worker ──────────────────────────────────────────────────────────
  worker:
    build: .
    image: ghcr.io/mysak7/az-spot-orchestrator:latest
    command: python worker.py
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      TEMPORAL_HOST: temporal:7233
    restart: unless-stopped

  # ── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Kibana ───────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  # ── Filebeat (ships Docker container logs → Elasticsearch) ───────────────────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.13.0
    user: root
    command: filebeat -e --strict.perms=false
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  temporal_data:
  es_data:
